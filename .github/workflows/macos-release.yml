name: macOS release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: macos-release
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (arm64)
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add aarch64-apple-darwin

      - name: Install xcodegen
        run: brew install xcodegen

      # xcodegen (brew latest) writes a modern project format (objectVersion 77,
      # i.e. Xcode 16+). The macos-14 image has an older Xcode selected by
      # default, which fails with "future Xcode project file format (77)". Select
      # the newest Xcode present on the runner so xcodebuild can read it.
      - name: Select newest Xcode
        run: |
          latest="$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)"
          if [ -z "$latest" ]; then echo "no /Applications/Xcode_*.app found"; exit 1; fi
          echo "Selecting $latest"
          sudo xcode-select -s "$latest/Contents/Developer"
          xcodebuild -version

      - name: Build + publish DMG
        env:
          GH_TOKEN: ${{ github.token }}
        run: macos/make-release.sh --publish

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: TTStation-dmg
          path: macos/dist/*.dmg
